<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sis 😜</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0b0b12;
    --accent: #8a5cff;
    --accent2: #ff4d8d;
    --text: #ffffff;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #141427, #05050a);
    color: var(--text);
    overflow: hidden;
}

/* ===== LAYOUT ===== */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    flex-direction: column;
    padding: 20px;
}

/* ===== TEXT ANIMATIONS ===== */
.fade {
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1s forwards;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ===== BUTTON ===== */
button {
    margin-top: 25px;
    padding: 12px 28px;
    border-radius: 40px;
    border: none;
    background: linear-gradient(45deg, var(--accent), var(--accent2));
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 20px rgba(138,92,255,0.6);
}

button:hover {
    transform: scale(1.1);
}

/* ===== SCREENS ===== */
.screen { display: none; }
.active { display: flex; }

/* ===== FLOATING EMOJIS ===== */
.emoji {
    position: absolute;
    font-size: 24px;
    opacity: 0.7;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* ===== FINAL ===== */
.final h1 {
    font-size: 3em;
    background: linear-gradient(90deg, #ff4d8d, #8a5cff);
    -webkit-background-clip: text;
    color: transparent;
}

</style>
</head>

<body>

<div id="emojis"></div>

<!-- SCREEN 1 -->
<div id="s1" class="container screen active">
    <h1 class="fade">Hello Kodo 😏</h1>
    <p class="fade" style="animation-delay:0.3s">Small Panda 😏</p>
    <button onclick="next(1)">Next</button>
</div>

<!-- SCREEN 2 -->
<div id="s2" class="container screen">
    <h2 class="fade">You have got 20...</h2>
    <p class="fade" style="animation-delay:0.3s">But height is still small 🤔</p>
    <button onclick="next(2)">Continue</button>
</div>

<!-- SCREEN 3 -->
<div id="s3" class="container screen">
    <h2 class="fade">Ek sachi baat</h2>
    <p class="fade" style="animation-delay:0.3s">Tum bri to ho lakin ho choti kodo 💀</p>
    <button onclick="next(3)">But wait...</button>
</div>

<!-- SCREEN 4 -->
<div id="s4" class="container screen">
    <h2 class="fade">Lakin yrr jo bhi ho tum ama b bn jao...</h2>
    <p class="fade" style="animation-delay:0.3s">Ho gi phrr b choti hi</p>
    <button onclick="next(4)">Final Message</button>
</div>

<!-- SCREEN 5 -->
<div id="s5" class="container screen final">
    <h1 class="fade">Happy Birthday 🎂</h1>
    <p class="fade" style="animation-delay:0.3s">
        Allah tumhe hamesha khush rakhe<br>
        or zindagi na kamiyabi ata kry 💜
    </p>
    <button onclick="confetti()">Celebrate 🎉</button>
</div>

<!-- AUDIO -->
<audio id="song" loop>
<source src="https://www.bensound.com/bensound-music/bensound-funny.mp3">
</audio>

<script>
/* ===== NAVIGATION ===== */
function next(n) {
    document.getElementById("s"+n).classList.remove("active");
    document.getElementById("s"+(n+1)).classList.add("active");
}

/* ===== FLOATING EMOJIS ===== */
const emojis = ["😂","🎂","💜","🔥","😜","🎉"];
const container = document.getElementById("emojis");

for(let i=0;i<25;i++){
    let e = document.createElement("div");
    e.className="emoji";
    e.innerText = emojis[Math.floor(Math.random()*emojis.length)];
    e.style.left = Math.random()*100+"vw";
    e.style.animationDuration = (5+Math.random()*5)+"s";
    container.appendChild(e);
}

/* ===== CONFETTI ===== */
function confetti(){
    const audio = document.getElementById("song");
    audio.play();

    for(let i=0;i<100;i++){
        let c = document.createElement("div");
        c.className="emoji";
        c.innerText="🎉";
        c.style.left=Math.random()*100+"vw";
        c.style.animationDuration=(2+Math.random()*3)+"s";
        document.body.appendChild(c);
    }
}
</script>

</body>
</html>
